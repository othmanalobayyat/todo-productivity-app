<!doctype html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <title>%WEB_TITLE%</title>

    <!-- ─── Web App Manifest (Android Chrome, general PWA) ─── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ─── iOS Safari: Home Screen icon ─── -->
    <!--
      apple-touch-icon must be a PNG without transparency.
      iOS applies its own rounded corners — do not pre-round.
      180×180 satisfies all modern iPhones (SE → Pro Max).
    -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ─── iOS Safari: Standalone (app-like) behaviour ─── -->
    <!-- Hides the browser chrome when launched from the Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      black-translucent: status bar overlays the app content (full-bleed).
      The app already uses SafeAreaProvider / useSafeAreaInsets, so the
      purple header accounts for the status bar height correctly.
    -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <!-- Label shown under the icon on the iOS Home Screen -->
    <meta name="apple-mobile-web-app-title" content="ToDo" />

    <!-- ─── Android Chrome: standalone hint ─── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!--
      theme-color and description are injected here by Expo at build time
      from app.json → web.themeColor / web.description via addMeta().
      No manual duplication needed.
    -->

    <!-- react-native-web recommended style reset -->
    <style id="expo-reset">
      /* Make body and html full height */
      html,
      body {
        height: 100%;
      }
      /* iOS PWA standalone: height:100% resolves to the initial containing
         block (ICB), which excludes the home-indicator zone on iOS Safari.
         This leaves a gap equal to env(safe-area-inset-bottom) at the bottom.
         -webkit-fill-available fills the viewport in pre-15.4 iOS Safari;
         100dvh (dynamic viewport height = window.innerHeight) covers 15.4+.
         body's background CSS-spec-paints to the full canvas regardless, so
         without this fix the body background shows below the React tree. */
      body {
        min-height: -webkit-fill-available;
        min-height: 100dvh;
      }
      /* Disable body scrolling — ScrollView handles it */
      body {
        overflow: hidden;
      }
      /* Root element full height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }

      /*
       * iOS PWA VIEWPORT STABILITY FIX
       *
       * Problem: in standalone mode iOS sometimes reports a different
       * window.innerHeight between launches (observed: 918px on first cold
       * start, 950px on subsequent relaunches — a 32px discrepancy).
       * Both window.innerHeight and visualViewport.height shift together, so
       * this is a genuine viewport-size change, not a CSS measurement artifact.
       *
       * In browser mode the min-height:100dvh trick is necessary because the
       * address bar can hide and reveal extra space. In standalone mode there
       * is no address bar, so there is no reason to use dvh over height:100%.
       * Overriding with height:100% + overflow:hidden in standalone mode locks
       * the layout to the ICB (initial containing block) — the same value as
       * window.innerHeight at page load — and prevents any transient oversized
       * viewport from stretching the body and pushing content down.
       */
      @media (display-mode: standalone) {
        html {
          height: 100%;
          /* Disable any dvh/fill-available expansion in standalone */
          min-height: unset;
          max-height: 100%;
          overflow: hidden;
        }
        body {
          height: 100%;
          min-height: unset;
          max-height: 100%;
          overflow: hidden;
        }
        #root {
          height: 100%;
          max-height: 100%;
          overflow: hidden;
        }
      }
    </style>

  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
