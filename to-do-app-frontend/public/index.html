<!doctype html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <title>%WEB_TITLE%</title>

    <!-- ─── Web App Manifest (Android Chrome, general PWA) ─── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ─── iOS Safari: Home Screen icon ─── -->
    <!--
      apple-touch-icon must be a PNG without transparency.
      iOS applies its own rounded corners — do not pre-round.
      180×180 satisfies all modern iPhones (SE → Pro Max).
    -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ─── iOS Safari: Standalone (app-like) behaviour ─── -->
    <!-- Hides the browser chrome when launched from the Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      black-translucent: status bar overlays the app content (full-bleed).
      The app already uses SafeAreaProvider / useSafeAreaInsets, so the
      purple header accounts for the status bar height correctly.
    -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <!-- Label shown under the icon on the iOS Home Screen -->
    <meta name="apple-mobile-web-app-title" content="ToDo" />

    <!-- ─── Android Chrome: standalone hint ─── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!--
      theme-color and description are injected here by Expo at build time
      from app.json → web.themeColor / web.description via addMeta().
      No manual duplication needed.
    -->

    <!-- react-native-web recommended style reset -->
    <style id="expo-reset">
      /* Make body and html full height */
      html,
      body {
        height: 100%;
      }
      /* Disable body scrolling — ScrollView handles it */
      body {
        overflow: hidden;
      }
      /* Root element full height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>

    <!-- ─── DEBUG: paint each HTML layer a unique colour ─────────────────────
         If any of these colours are visible in the running app it means that
         layer is NOT fully covered by the React tree above it.
           hotpink  = <html>  (outermost — should never show)
           orange   = <body>  (should never show)
           gold     = #root   (should never show)
         Remove this block before shipping.
    ──────────────────────────────────────────────────────────────────────── -->
    <style id="debug-layers">
      html { background: hotpink !important; }
      body { background: orange !important; }
      #root { background: gold !important; }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
